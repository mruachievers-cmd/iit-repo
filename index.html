<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interview of Destiny - A Story-Driven Corporate Action RPG">
    <title>Interview of Destiny</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Landing Screen -->
    <div id="landing-screen">
        <div class="landing-content">
            <div class="landing-title-glow"></div>
            <h1 class="landing-title">INTERVIEW<br><span class="title-highlight">OF DESTINY</span></h1>
            <p class="landing-subtitle">A Corporate Survival RPG</p>
            <div class="landing-divider"></div>
            <button id="start-btn" class="landing-btn" onclick="document.getElementById('landing-screen').style.display='none'; window.game.startGame();">
                ▶ START GAME
            </button>
            <p class="landing-hint">Fight. Survive. Get Hired.</p>
        </div>
        <div class="landing-particles" id="landing-particles"></div>
    </div>

    <!-- Game Wrapper -->
    <div id="game-wrapper" style="display:none;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <input type="text" id="name-input" placeholder="Type your name..." maxlength="20" autocomplete="off"
            spellcheck="false">
        <!-- Pause Button (top-right) -->
        <button id="pause-btn" class="game-control-btn" title="Pause Game">⏸</button>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-overlay" style="display:none;">
        <div class="pause-content">
            <h2 class="pause-title">⏸ PAUSED</h2>
            <button class="pause-menu-btn" onclick="window.game.resumeGame();">▶ RESUME</button>
            <button class="pause-menu-btn pause-stop-btn" onclick="window.game.stopGame();">⏹ QUIT TO MENU</button>
        </div>
    </div>

    <!-- Load scripts in dependency order -->
    <script src="js/constants.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/player.js"></script>
    <script src="js/npc.js"></script>
    <script src="js/dialogue.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/puzzle.js"></script>
    <script src="js/tutorial.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
